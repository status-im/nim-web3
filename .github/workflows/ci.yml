name: CI
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: status-im/nimbus-common-workflow/.github/workflows/common.yml@main
    with:
      nim-versions: '["version-2-0", "version-2-2", "devel"]'
      test-command: |
        nim --version
        nimble --version
        gcc --version

        if [[ "$MATRIX_OS" == "macos" && "$CPU" == "arm64" ]]; then
          NIMFLAGS="--cpu:arm64 --cc:clang --passC:\"-target arm64-apple-macos11\" --passL:\"-target arm64-apple-macos11\""
        fi

        ./ci-test.sh
